sonar.projectKey=SC0RED_clawndom
sonar.organization=sc0red
sonar.projectName=clawndom

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Suppress all Sonar issues on test files. Code-smell rules (e.g. S7778
# "don't push multiple times") fire on legitimate test patterns like Node
# Readable stream protocol (`stream.push(data); stream.push(null);` for
# EOF) where Sonar's heuristic doesn't have the context. We keep
# `sonar.tests` populated so coverage attribution still works; this only
# tells Sonar to skip rule evaluation on those paths.
sonar.issue.ignore.multicriteria=tests-all
sonar.issue.ignore.multicriteria.tests-all.ruleKey=*
sonar.issue.ignore.multicriteria.tests-all.resourceKey=tests/**
