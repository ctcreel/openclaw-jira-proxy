sonar.projectKey=SC0RED_clawndom
sonar.organization=sc0red
sonar.projectName=clawndom

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Exclude tests from Sonar analysis.
#
# Per-test YAML fixtures share the same routing/rules/messageTemplate
# structure by necessity — that structure IS the surface under test.
# Sonar tokenizes the shape as cross-file duplication, and its
# new_duplicated_lines_density quality-gate metric ignores
# sonar.cpd.exclusions for PR-mode new code (it honors it for the
# whole-project density only). sonar.test.exclusions IS honored on
# PR-mode new-code metrics, so it's the only knob that keeps adding
# audit tests from blowing the quality gate.
#
# Tests are still listed under sonar.tests so coverage cross-refs
# still resolve — the exclusion removes these files from the
# analysis metrics, not from the test-source mapping.
sonar.test.exclusions=tests/**

# src/secrets/cache.ts: the file is a defensive reader with multiple
# distinct error-recovery paths (JSON parse fail, schema mismatch,
# stat fail, perm/owner mismatch) that share a "log a per-context
# warning and degrade gracefully" shape. Sonar's tokenizer flags the
# similar bodies as duplication; merging them into a shared helper
# would erode the per-error-class observability that's the entire
# point of the per-path warnings.
sonar.cpd.exclusions=src/secrets/cache.ts

