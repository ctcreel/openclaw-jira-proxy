sonar.projectKey=SC0RED_clawndom
sonar.organization=sc0red
sonar.projectName=clawndom

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Skip copy-paste detection on tests. Test setup is allowed to be
# repetitive — the boilerplate makes each test self-contained and easy
# to read in isolation. DRY-ing test setup behind helpers can hide what
# the test actually exercises.
sonar.cpd.exclusions=tests/**

