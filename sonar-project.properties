sonar.projectKey=SC0RED_clawndom
sonar.organization=sc0red
sonar.projectName=clawndom

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Skip copy-paste detection on tests. Test setup is allowed to be
# repetitive — the boilerplate makes each test self-contained and easy
# to read in isolation. DRY-ing test setup behind helpers can hide what
# the test actually exercises.
sonar.cpd.exclusions=tests/**

# Permission-safety hotspot (S2612) is a false positive in test fixtures
# that intentionally exercise insecure permission paths — e.g. the
# secrets-cache regression test writes a 0644 file specifically to
# verify the cache REJECTS broader-than-0600 modes. The risk warning
# fires on the test's intent, not a real security gap.
sonar.issue.ignore.multicriteria=test-permissions
sonar.issue.ignore.multicriteria.test-permissions.ruleKey=typescript:S2612
sonar.issue.ignore.multicriteria.test-permissions.resourceKey=tests/**
