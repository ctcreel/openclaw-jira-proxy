name: Pull Request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci-checks:
    name: CI Checks
    uses: ./.github/workflows/_ci-checks.yml
    secrets: inherit

  naming-validation:
    name: Naming Validation
    uses: ./.github/workflows/_naming-validation.yml
    secrets: inherit

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [ci-checks, naming-validation]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Pull Request Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Checks | ${{ needs.ci-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Naming Validation | ${{ needs.naming-validation.result }} |" >> $GITHUB_STEP_SUMMARY
