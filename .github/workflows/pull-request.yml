name: Pull Request

on:
  pull_request:
    branches:
      - development
      - testing
      - demo
      - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci-checks:
    name: CI Checks
    uses: ./.github/workflows/_ci-checks.yml
    secrets: inherit

  validate-deploy:
    name: Validate Deploy
    needs: ci-checks
    if: vars.ENABLE_DEPLOY == 'true'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: development
      deploy: false
    secrets: inherit

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [ci-checks, validate-deploy]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Pull Request Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI Checks | ${{ needs.ci-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Validation | ${{ needs.validate-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
