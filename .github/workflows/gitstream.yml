name: gitStream

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gitstream:
    runs-on: ubuntu-latest
    name: gitStream
    steps:
      - uses: actions/checkout@v4
      - uses: linear-b/gitstream-github-action@v2
        with:
          full_repository: ${{ github.repository }}
          head_ref: ${{ github.head_ref }}
          base_ref: ${{ github.base_ref }}
